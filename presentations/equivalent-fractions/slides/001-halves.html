<!doctype html>
<html lang="en" data-deck-keys-bound="true"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Halves from 0 to 3</title>
    <link rel="stylesheet" href="../../../styles/slide.css">
    <style>
      .number-line svg {
        overflow: visible;
      }

      .animate-controls {
        display: flex;
        justify-content: center;
        margin-top: 2rem;
      }

      .animate-button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #255f9f;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.02em;
        padding: 0.7rem 1.6rem;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .animate-button:hover,
      .animate-button:focus-visible {
        background: #1f4f85;
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      }

      .animate-button:focus-visible {
        outline: 4px solid rgba(37, 95, 159, 0.28);
        outline-offset: 4px;
      }

      .animate-button:active {
        transform: translateY(1px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.16);
      }

      .animated-segment {
        fill: none;
        stroke: #d85a2a;
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.18));
      }

      .animated-segment-under {
        stroke: #2f8f5b;
      }

      .segment-arrow {
        fill: #d85a2a;
        opacity: 0;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.18));
      }

      .segment-arrow-under {
        fill: #2f8f5b;
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <h1 class="slide-title">Halves from 0 to 3</h1>
      <section class="number-line" aria-label="Halves from 0 to 3">
        <svg viewBox="0 0 1600 260" role="img">
          <defs>
            <path id="half-segment-0-1" d="M 64 110 C 130 82, 243 82, 309 110"></path>
            <path id="half-segment-1-2" d="M 309 110 C 375 82, 488 82, 554 110"></path>
            <path id="whole-segment-0-1" d="M 64 176 C 205 226, 413 226, 554 176"></path>
          </defs>
          <line class="axis" x1="42" y1="138" x2="1558" y2="138"></line>
          <polygon class="axis-arrow" points="26,138 50,126 50,150"></polygon>
          <polygon class="axis-arrow" points="1574,138 1550,126 1550,150"></polygon>

          <g data-tick="0"><line class="tick" x1="64" y1="120" x2="64" y2="158"></line><text class="fraction-label" x="64" y="42">0</text><line class="fraction-rule" x1="42" y1="54" x2="86" y2="54"></line><text class="fraction-label" x="64" y="96">2</text><text class="whole-label" x="64" y="208">0</text></g>
          <g data-tick="1"><line class="tick" x1="309" y1="126" x2="309" y2="150"></line><text class="fraction-label" x="309" y="42">1</text><line class="fraction-rule" x1="287" y1="54" x2="331" y2="54"></line><text class="fraction-label" x="309" y="96">2</text></g>
          <g data-tick="2"><line class="tick" x1="554" y1="120" x2="554" y2="158"></line><text class="fraction-label" x="554" y="42">2</text><line class="fraction-rule" x1="532" y1="54" x2="576" y2="54"></line><text class="fraction-label" x="554" y="96">2</text><text class="whole-label" x="554" y="208">1</text></g>
          <g data-tick="3"><line class="tick" x1="799" y1="126" x2="799" y2="150"></line><text class="fraction-label" x="799" y="42">3</text><line class="fraction-rule" x1="777" y1="54" x2="821" y2="54"></line><text class="fraction-label" x="799" y="96">2</text></g>
          <g data-tick="4"><line class="tick" x1="1044" y1="120" x2="1044" y2="158"></line><text class="fraction-label" x="1044" y="42">4</text><line class="fraction-rule" x1="1022" y1="54" x2="1066" y2="54"></line><text class="fraction-label" x="1044" y="96">2</text><text class="whole-label" x="1044" y="208">2</text></g>
          <g data-tick="5"><line class="tick" x1="1289" y1="126" x2="1289" y2="150"></line><text class="fraction-label" x="1289" y="42">5</text><line class="fraction-rule" x1="1267" y1="54" x2="1311" y2="54"></line><text class="fraction-label" x="1289" y="96">2</text></g>
          <g data-tick="6"><line class="tick" x1="1534" y1="120" x2="1534" y2="158"></line><text class="fraction-label" x="1534" y="42">6</text><line class="fraction-rule" x1="1512" y1="54" x2="1556" y2="54"></line><text class="fraction-label" x="1534" y="96">2</text><text class="whole-label" x="1534" y="208">3</text></g>

          <g class="animation-layer" aria-hidden="true">
            <path class="animated-segment" data-animate-segment="half-0-1" d="M 64 110 C 130 82, 243 82, 309 110"></path>
            <polygon class="segment-arrow" data-animate-arrow="half-0-1" points="309,110 287,99 291,124"></polygon>
            <path class="animated-segment" data-animate-segment="half-1-2" d="M 309 110 C 375 82, 488 82, 554 110"></path>
            <polygon class="segment-arrow" data-animate-arrow="half-1-2" points="554,110 532,99 536,124"></polygon>
            <path class="animated-segment animated-segment-under" data-animate-segment="whole-0-1" d="M 64 176 C 205 226, 413 226, 554 176"></path>
            <polygon class="segment-arrow segment-arrow-under" data-animate-arrow="whole-0-1" points="554,176 529,174 542,197"></polygon>
          </g>
        </svg>
      </section>
      <div class="animate-controls">
        <button class="animate-button" type="button" id="animateSegments" aria-label="Animate halves and whole from zero to one">Animate</button>
      </div>
    </main>
    <script>
      (function () {
        var button = document.getElementById('animateSegments');
        var segments = Array.prototype.slice.call(document.querySelectorAll('[data-animate-segment]'));
        var arrows = Array.prototype.slice.call(document.querySelectorAll('[data-animate-arrow]'));
        var timeouts = [];

        function clearTimers() {
          timeouts.forEach(function (timeoutId) {
            window.clearTimeout(timeoutId);
          });
          timeouts = [];
        }

        function resetAnimation() {
          clearTimers();
          segments.forEach(function (segment) {
            var length = segment.getTotalLength();
            segment.style.transition = 'none';
            segment.style.strokeDasharray = length;
            segment.style.strokeDashoffset = length;
            segment.style.opacity = '0';
          });
          arrows.forEach(function (arrow) {
            arrow.style.transition = 'none';
            arrow.style.opacity = '0';
          });
        }

        function drawSegment(segmentName, delay, duration) {
          var segment = document.querySelector('[data-animate-segment="' + segmentName + '"]');
          var arrow = document.querySelector('[data-animate-arrow="' + segmentName + '"]');

          timeouts.push(window.setTimeout(function () {
            segment.style.transition = 'opacity 160ms ease, stroke-dashoffset ' + duration + 'ms ease-in-out';
            segment.style.opacity = '1';
            segment.style.strokeDashoffset = '0';
          }, delay));

          timeouts.push(window.setTimeout(function () {
            arrow.style.transition = 'opacity 180ms ease';
            arrow.style.opacity = '1';
          }, delay + duration - 90));
        }

        function runAnimation() {
          resetAnimation();
          window.requestAnimationFrame(function () {
            window.requestAnimationFrame(function () {
              drawSegment('half-0-1', 80, 850);
              drawSegment('half-1-2', 1050, 850);
              drawSegment('whole-0-1', 2100, 1050);
            });
          });
        }

        resetAnimation();
        button.addEventListener('click', runAnimation);
      }());
    </script>
    <script type="application/json" data-speaker-notes="">
{
  "notes": "Start at zero halves. Move along the number line one half at a time. Pause at 2/2, 4/2 and 6/2 to connect those fractions to 1, 2 and 3."
}
    </script>
  

</body></html>
