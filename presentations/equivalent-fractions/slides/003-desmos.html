<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Desmos Calculator</title>
    <link rel="stylesheet" href="../../../styles/slide.css">
    <style>
      .web-slide {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 18px;
        padding: 3.1% 3.1% 3.5%;
      }

      .web-slide__title {
        margin: 0;
        color: var(--slide-ink);
        font-size: clamp(28px, 3.6vw, 54px);
        line-height: 1;
        font-weight: 850;
        letter-spacing: 0;
      }

      .web-slide__frame-wrap {
        min-height: 0;
        border: 1px solid #d9dee8;
        border-radius: 8px;
        background: #f8fafc;
        overflow: hidden;
      }

      .web-slide__calculator {
        width: 100%;
        height: 100%;
        background: #fff;
      }

      .web-slide__fallback {
        position: absolute;
        right: 3.1%;
        bottom: 2.2%;
        color: var(--slide-muted);
        font-size: 13px;
      }

      .web-slide__fallback a {
        color: #2b2a70;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="slide web-slide">
      <h1 class="web-slide__title">Desmos Calculator</h1>
      <div class="web-slide__frame-wrap">
        <div class="web-slide__calculator" id="calculator" role="application" aria-label="Desmos graphing calculator"></div>
      </div>
      <p class="web-slide__fallback">
        <a href="https://www.desmos.com/calculator" target="_blank" rel="noopener">Open Desmos</a>
      </p>
    </main>
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <script>
      const calculatorElement = document.querySelector("#calculator");
      const calculator = Desmos.GraphingCalculator(calculatorElement, {
        expressions: true,
        settingsMenu: true,
        zoomButtons: true,
        keypad: true
      });
      calculator.setExpression({ id: "line", latex: "y=x" });
      calculator.setExpression({ id: "parabola", latex: "y=x^2" });
    </script>
    <script type="application/json" data-speaker-notes>
{
  "notes": "Use this slide when students need to test a graph interactively. Click inside Desmos to interact with the calculator; click back outside the calculator before using deck keyboard navigation."
}
    </script>
  </body>
</html>
