<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Desmos Calculator</title>
    <link rel="stylesheet" href="../../../styles/slide.css">
    <style>
      .web-slide {
        padding: 0;
      }

      .web-slide__frame-wrap {
        position: absolute;
        inset: 0;
        min-height: 0;
        border: 0;
        border-radius: 0;
        background: #fff;
        overflow: hidden;
      }

      .web-slide__calculator {
        width: 100%;
        height: 100%;
        background: #fff;
      }

    </style>
  </head>
  <body>
    <main class="slide web-slide">
      <div class="web-slide__frame-wrap">
        <div class="web-slide__calculator" id="calculator" role="application" aria-label="Desmos graphing calculator"></div>
      </div>
    </main>
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <script>
      const calculatorElement = document.querySelector("#calculator");
      const calculator = Desmos.GraphingCalculator(calculatorElement, {
        expressions: true,
        settingsMenu: true,
        zoomButtons: true,
        keypad: true
      });
      calculator.setExpression({ id: "line", latex: "y=x" });
      calculator.setExpression({ id: "parabola", latex: "y=x^2" });
    </script>
    <script type="application/json" data-speaker-notes>
{
  "notes": "Use this slide when students need to test a graph interactively. Click inside Desmos to interact with the calculator; click back outside the calculator before using deck keyboard navigation."
}
    </script>
  </body>
</html>
