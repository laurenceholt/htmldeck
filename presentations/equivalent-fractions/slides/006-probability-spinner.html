<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Probability Spinner</title>
    <link rel="stylesheet" href="../../../styles/slide.css">
    <style>
      :root {
        --navy: #071d49;
        --teal: #0b6f86;
        --blue: #0b63ce;
        --red: #ef3f3f;
        --green: #4cae62;
        --yellow: #ffc324;
        --line: #d9e0ea;
      }

      .spinner-slide {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        gap: 8px;
        padding: 1.8% 3.1% 2%;
        color: var(--navy);
      }

      .spinner-title {
        margin: 0;
        font-size: clamp(40px, 4.4vw, 64px);
        line-height: 0.95;
        font-weight: 850;
        letter-spacing: 0;
      }

      .spinner-subtitle {
        margin: 0;
        color: var(--teal);
        font-size: clamp(20px, 2vw, 30px);
      }

      .spinner-layout {
        display: grid;
        grid-template-columns: minmax(340px, 0.95fr) minmax(360px, 1.05fr) minmax(260px, 0.62fr);
        gap: 22px;
        min-height: 0;
        overflow: hidden;
      }

      .panel {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 10px 28px rgba(7, 29, 73, 0.08);
        overflow: hidden;
      }

      .spinner-panel {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        padding: 16px;
      }

      .wheel-wrap {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 0;
      }

      .wheel {
        width: min(430px, 78%);
        aspect-ratio: 1;
        filter: drop-shadow(0 8px 18px rgba(7, 29, 73, 0.16));
        transition: transform 1.1s cubic-bezier(0.2, 0.8, 0.18, 1);
      }

      .pointer {
        position: absolute;
        right: 12%;
        top: 50%;
        width: 30%;
        height: 12px;
        transform-origin: 86% 50%;
        transform: rotate(22deg);
        border-radius: 999px;
        background: #2a2f37;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
      }

      .pointer::after {
        position: absolute;
        right: -14px;
        top: 50%;
        width: 38px;
        height: 38px;
        transform: translateY(-50%);
        border: 7px solid #2a2f37;
        border-radius: 50%;
        background: #757b82;
        content: "";
      }

      .probability-key {
        display: none;
        justify-content: center;
        gap: 20px;
        margin: 8px 0 0;
        color: var(--slide-ink);
        font-size: 18px;
      }

      .key-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .swatch {
        width: 18px;
        height: 18px;
        border-radius: 4px;
      }

      .results-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        padding: 18px;
      }

      .panel-title {
        margin: 0 0 8px;
        text-align: center;
        color: var(--slide-ink);
        font-size: 26px;
        font-weight: 850;
      }

      .chart {
        display: grid;
        grid-template-columns: 54px repeat(4, 1fr);
        align-items: end;
        gap: 18px;
        min-height: 0;
        border-bottom: 2px solid var(--line);
        padding: 16px 10px 0;
      }

      .axis-label {
        align-self: center;
        justify-self: center;
        transform: rotate(-90deg);
        color: var(--slide-ink);
        font-size: 18px;
      }

      .bar-wrap {
        display: grid;
        grid-template-rows: 26px minmax(0, 1fr) 30px;
        height: 100%;
        text-align: center;
      }

      .bar-count {
        color: var(--slide-ink);
        font-size: 22px;
        font-weight: 800;
      }

      .bar {
        align-self: end;
        min-height: 2px;
        border-radius: 3px 3px 0 0;
        transition: height 240ms ease;
      }

      .bar-label {
        color: var(--slide-ink);
        font-size: 18px;
      }

      .total {
        display: none;
        margin: 10px 0 0;
        text-align: center;
        color: var(--slide-ink);
        font-size: 24px;
      }

      .total strong {
        color: var(--blue);
      }

      .side-panel {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .payouts {
        overflow: hidden;
      }

      .payouts h2,
      .net-result h2 {
        margin: 0;
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: center;
        color: var(--slide-ink);
        font-size: 22px;
      }

      .payout-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        border-bottom: 1px solid var(--line);
        padding: 7px 16px;
        font-size: 16px;
      }

      .payout-row:last-child {
        border-bottom: 0;
      }

      .net-result {
        padding-bottom: 10px;
        text-align: center;
      }

      .net-value {
        margin: 10px 0 0;
        color: #087b63;
        font-size: 34px;
        font-weight: 850;
      }

      .net-detail {
        margin: 0;
        color: var(--slide-ink);
        font-size: 16px;
      }

      .question {
        padding: 13px 16px;
        color: var(--blue);
        font-size: 20px;
        font-weight: 850;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 28px;
        padding: 0 7%;
      }

      .control-button {
        border: 1px solid #b7c9e8;
        border-radius: 7px;
        background: #fff;
        color: var(--blue);
        padding: 10px 18px;
        font: inherit;
        font-size: 20px;
        font-weight: 760;
        cursor: pointer;
      }

      .control-button.primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="slide spinner-slide">
      <h1 class="spinner-title">Probability Spinner</h1>
      <p class="spinner-subtitle">Compare experimental results to theoretical probabilities.</p>

      <section class="spinner-layout">
        <div class="panel spinner-panel">
          <div class="wheel-wrap">
            <svg class="wheel" id="wheel" viewBox="0 0 200 200" aria-label="Spinner with red one half, blue one fourth, green one eighth, and yellow one eighth">
              <path d="M100 100 L100 4 A96 96 0 1 0 100 196 Z" fill="var(--red)"></path>
              <path d="M100 100 L100 4 A96 96 0 0 1 196 100 Z" fill="var(--blue)"></path>
              <path d="M100 100 L196 100 A96 96 0 0 1 167.9 167.9 Z" fill="var(--green)"></path>
              <path d="M100 100 L167.9 167.9 A96 96 0 0 1 100 196 Z" fill="var(--yellow)"></path>
              <circle cx="100" cy="100" r="96" fill="none" stroke="#fff" stroke-width="2"></circle>
              <line x1="100" y1="4" x2="100" y2="196" stroke="#fff" stroke-width="2"></line>
              <line x1="100" y1="100" x2="196" y2="100" stroke="#fff" stroke-width="2"></line>
              <line x1="100" y1="100" x2="167.9" y2="167.9" stroke="#fff" stroke-width="2"></line>
              <text x="52" y="108" fill="#fff" font-size="19" font-weight="800" text-anchor="middle">1/2</text>
              <text x="140" y="60" fill="#fff" font-size="16" font-weight="800" text-anchor="middle">1/4</text>
              <text x="152" y="128" fill="#fff" font-size="14" font-weight="800" text-anchor="middle">1/8</text>
              <text x="126" y="154" fill="#fff" font-size="14" font-weight="800" text-anchor="middle">1/8</text>
            </svg>
            <div class="pointer" aria-hidden="true"></div>
          </div>
          <div class="probability-key">
            <span class="key-item"><span class="swatch" style="background: var(--red)"></span>1/2</span>
            <span class="key-item"><span class="swatch" style="background: var(--blue)"></span>1/4</span>
            <span class="key-item"><span class="swatch" style="background: var(--green)"></span>1/8</span>
            <span class="key-item"><span class="swatch" style="background: var(--yellow)"></span>1/8</span>
          </div>
        </div>

        <div class="panel results-panel">
          <h2 class="panel-title">Live results</h2>
          <div class="chart" id="chart"></div>
          <p class="total">Total spins: <strong id="totalSpins">0</strong></p>
        </div>

        <aside class="side-panel">
          <div class="panel payouts">
            <h2>Payouts</h2>
            <div class="payout-row"><span>Cost to play</span><strong>$2</strong></div>
            <div class="payout-row"><span>Red pays</span><strong>$1</strong></div>
            <div class="payout-row"><span>Blue pays</span><strong>$3</strong></div>
            <div class="payout-row"><span>Green pays</span><strong>$5</strong></div>
            <div class="payout-row"><span>Yellow pays</span><strong>$8</strong></div>
          </div>
          <div class="panel net-result">
            <h2>Net result</h2>
            <p class="net-value" id="netResult">$0</p>
            <p class="net-detail">after <span id="netSpins">0</span> spins</p>
          </div>
          <div class="panel question">Is the game fair?</div>
        </aside>
      </section>

      <div class="controls">
        <button class="control-button primary" id="spinButton" type="button">Spin</button>
        <button class="control-button" id="runButton" type="button">Run 100 spins</button>
        <button class="control-button" id="resetButton" type="button">Reset data</button>
      </div>
    </main>

    <script>
      const outcomes = [
        { name: "Red", color: "var(--red)", probability: 0.5, payout: 1, start: 90, span: 180 },
        { name: "Blue", color: "var(--blue)", probability: 0.25, payout: 3, start: 0, span: 90 },
        { name: "Green", color: "var(--green)", probability: 0.125, payout: 5, start: 270, span: 45 },
        { name: "Yellow", color: "var(--yellow)", probability: 0.125, payout: 8, start: 225, span: 45 }
      ];
      const counts = Object.fromEntries(outcomes.map((outcome) => [outcome.name, 0]));
      const chart = document.querySelector("#chart");
      const wheel = document.querySelector("#wheel");
      let total = 0;
      let net = 0;
      let rotation = 0;

      chart.append(Object.assign(document.createElement("div"), { className: "axis-label", textContent: "Spins" }));
      outcomes.forEach((outcome) => {
        const wrap = document.createElement("div");
        wrap.className = "bar-wrap";
        wrap.innerHTML = `<div class="bar-count">0</div><div class="bar" style="height:2px;background:${outcome.color}"></div><div class="bar-label">${outcome.name}</div>`;
        chart.append(wrap);
      });

      function spin() {
        const value = Math.random();
        let cumulative = 0;
        const outcome = outcomes.find((item) => {
          cumulative += item.probability;
          return value <= cumulative;
        }) || outcomes[0];

        counts[outcome.name] += 1;
        total += 1;
        net += outcome.payout - 2;
        const landing = outcome.start + outcome.span / 2;
        rotation += 720 + (360 - landing);
        wheel.style.transform = `rotate(${rotation}deg)`;
        update();
      }

      function update() {
        const max = Math.max(1, ...Object.values(counts));
        document.querySelectorAll(".bar-wrap").forEach((wrap, index) => {
          const outcome = outcomes[index];
          const count = counts[outcome.name];
          wrap.querySelector(".bar-count").textContent = count;
          wrap.querySelector(".bar").style.height = `${Math.max(2, count / max * 86)}%`;
        });
        document.querySelector("#totalSpins").textContent = total;
        document.querySelector("#netSpins").textContent = total;
        document.querySelector("#netResult").textContent = `${net >= 0 ? "+" : "-"}$${Math.abs(net)}`;
      }

      document.querySelector("#spinButton").addEventListener("click", spin);
      document.querySelector("#runButton").addEventListener("click", () => {
        for (let i = 0; i < 100; i += 1) spin();
      });
      document.querySelector("#resetButton").addEventListener("click", () => {
        outcomes.forEach((outcome) => { counts[outcome.name] = 0; });
        total = 0;
        net = 0;
        rotation = 0;
        wheel.style.transform = "rotate(0deg)";
        update();
      });
      update();
    </script>
    <script type="application/json" data-speaker-notes>
{
  "notes": "Ask students to compare the experimental bars to the theoretical spinner areas. The expected payout is $2.125 on a $2 cost, so the game is slightly favorable to the player over many spins."
}
    </script>
  </body>
</html>
