<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plotting Unit Fractions on a Number Line</title>
    <link rel="stylesheet" href="../../../styles/slide.css">
    <style>
      :root {
        --blue: #087da8;
        --blue-soft: #dff4fb;
        --green: #1f9d71;
        --green-soft: #dff8ec;
        --gold: #f4b942;
        --gold-soft: #fff1c7;
        --purple: #7c3aed;
        --ink: #111827;
        --muted: #607083;
        --line: #d8e1ea;
        --tip: #fbf0d7;
      }

      body {
        background:
          linear-gradient(90deg, rgba(8, 125, 168, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(8, 125, 168, 0.04) 1px, transparent 1px),
          #ffffff;
        background-size: 40px 40px;
        display: grid;
        place-items: center;
      }

      .slide {
        display: flex;
        flex-direction: column;
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        aspect-ratio: 16 / 9;
        padding: clamp(20px, 2.4vw, 34px);
        gap: clamp(12px, 1.4vw, 20px);
        color: var(--ink);
      }

      .top-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 28px;
      }

      .slide-title {
        position: static;
        max-width: 980px;
        font-size: clamp(28px, 3.3vw, 48px);
        line-height: 0.98;
      }

      .learning-goal {
        margin-top: 10px;
        color: var(--muted);
        font-size: clamp(15px, 1.3vw, 19px);
        font-weight: 550;
      }

      .stage {
        position: relative;
        flex: 1;
        min-height: 0;
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.74);
        overflow: hidden;
      }

      .stage svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
        touch-action: none;
      }

      .axis {
        stroke: var(--blue);
        stroke-width: 6;
        stroke-linecap: round;
      }

      .tick {
        stroke: var(--blue);
        stroke-width: 5;
        stroke-linecap: round;
      }

      .minor-tick {
        stroke-width: 4;
      }

      .whole-highlight {
        fill: rgba(8, 125, 168, 0.12);
        stroke: rgba(8, 125, 168, 0.28);
        stroke-width: 2;
        rx: 12;
      }

      .part-band {
        fill: rgba(8, 125, 168, 0.08);
        stroke: rgba(8, 125, 168, 0.28);
        stroke-width: 2;
        rx: 8;
      }

      .part-band {
        cursor: pointer;
      }

      .part-band:hover {
        fill: rgba(31, 157, 113, 0.18);
      }

      .shade {
        fill: rgba(31, 157, 113, 0.34);
        stroke: var(--green);
        stroke-width: 3;
        rx: 8;
      }

      .equal-label {
        fill: var(--blue);
        font-size: 24px;
        font-weight: 650;
        text-anchor: middle;
      }

      .whole-label {
        fill: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 45px;
        text-anchor: middle;
      }

      .fraction-text {
        fill: var(--blue);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 36px;
        text-anchor: middle;
      }

      .fraction-rule {
        stroke: var(--blue);
        stroke-width: 2.5;
        stroke-linecap: round;
      }

      .endpoint {
        fill: var(--green);
        stroke: #ffffff;
        stroke-width: 4;
        filter: drop-shadow(0 6px 10px rgba(17, 24, 39, 0.22));
      }

      .endpoint.is-pulsing {
        animation: pulsePoint 1.1s ease-in-out infinite;
      }

      .arrow-note {
        stroke: #7b8794;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 1 8;
      }

      .note-card {
        fill: var(--tip);
        filter: drop-shadow(0 8px 16px rgba(17, 24, 39, 0.14));
      }

      .note-text {
        fill: var(--ink);
        font-size: 20px;
        font-weight: 430;
      }

      .feedback[hidden] {
        display: none;
      }

      .feedback {
        position: absolute;
        right: 28px;
        bottom: 126px;
        z-index: 7;
        max-width: 430px;
        padding: 14px 18px;
        border-radius: 10px;
        background: var(--tip);
        color: var(--ink);
        font-size: 18px;
        font-weight: 430;
        line-height: 1.24;
        box-shadow: 0 12px 28px rgba(17, 24, 39, 0.14);
      }

      .feedback.is-correct {
        background: var(--green-soft);
      }

      .feedback.is-try {
        background: var(--tip);
      }

      .control-dot {
        cursor: ew-resize;
        filter: drop-shadow(0 5px 9px rgba(17, 24, 39, 0.24));
      }

      .control-dot .hit {
        fill: transparent;
        stroke: none;
      }

      .control-dot .outer {
        fill: #ffffff;
        stroke: var(--blue);
        stroke-width: 4;
      }

      .control-dot .inner {
        fill: var(--blue);
        stroke: #ffffff;
        stroke-width: 2;
      }

      .drag-tip {
        pointer-events: none;
      }

      .drag-tip-line {
        stroke: #7b8794;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 1 8;
      }

      .drag-tip-card {
        fill: var(--tip);
        filter: drop-shadow(0 8px 16px rgba(17, 24, 39, 0.14));
      }

      .drag-tip-text {
        fill: var(--ink);
        font-size: 19px;
        font-weight: 430;
      }

      .stepper {
        position: absolute;
        right: 28px;
        top: 36px;
        z-index: 9;
        display: flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(17, 24, 39, 0.12);
        padding: 5px 7px;
        box-shadow: 0 10px 24px rgba(17, 24, 39, 0.14);
      }

      .stepper-button {
        display: grid;
        place-items: center;
        width: 24px;
        height: 24px;
        border: 0;
        border-radius: 999px;
        background: #1f2937;
        color: #ffffff;
        font-size: 15px;
        font-weight: 900;
        cursor: pointer;
      }

      .stepper-button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .step-track {
        display: flex;
        gap: 3px;
      }

      .step-segment {
        width: 14px;
        height: 6px;
        border: 0;
        border-radius: 999px;
        background: #d1d5db;
        cursor: pointer;
      }

      .step-segment.is-active {
        width: 24px;
        background: #1f2937;
      }

      .caption-bar {
        position: absolute;
        left: 50%;
        bottom: 70px;
        z-index: 10;
        width: calc(100% - 44px);
        max-width: 1470px;
        transform: translateX(-50%);
        color: #ffffff;
        font-size: clamp(22px, 1.9vw, 31px);
        line-height: 1.18;
        font-weight: 500;
        text-align: center;
        text-wrap: balance;
      }

      .caption-text {
        display: inline-block;
        max-width: 100%;
      }

      .caption-dismiss {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 20px;
        margin-left: 10px;
        margin-right: -2px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #ffffff;
        font-size: 18px;
        font-weight: 400;
        line-height: 1;
        cursor: pointer;
        text-shadow: inherit;
        transform: translateY(-4px);
        vertical-align: -4px;
      }

      .subtitle-line {
        display: flex;
        justify-content: center;
        line-height: 1;
      }

      .subtitle-line + .subtitle-line {
        margin-top: 0;
      }

      .subtitle-line > span {
        display: inline-flex;
        align-items: center;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 10px 5px;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.65);
      }

      .caption-bar[hidden] {
        display: none;
      }

      .vfrac {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        vertical-align: middle;
        margin: 0 0.2em 0 0.28em;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.74em;
        line-height: 0.78;
      }

      .vfrac::before {
        content: "";
        order: 2;
        width: 0.72em;
        border-top: 0.09em solid currentColor;
        margin: 0.12em 0;
      }

      .vfrac span:first-child {
        order: 1;
      }

      .vfrac span:last-child {
        order: 3;
      }

      @keyframes pulsePoint {
        0%, 100% {
          r: 12;
          opacity: 1;
        }
        50% {
          r: 18;
          opacity: 0.72;
        }
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <div class="top-row">
        <div>
          <h1 class="slide-title">Plotting Unit Fractions</h1>
          <div class="learning-goal">I can plot a unit fraction by making equal parts from 0 to 1.</div>
        </div>
      </div>

      <section class="stage" aria-label="Interactive number line for plotting unit fractions">
        <svg id="numberLineSvg" viewBox="0 0 1600 620" role="img" aria-labelledby="svgTitle svgDesc">
          <title id="svgTitle">Plot unit fractions on a number line</title>
          <desc id="svgDesc">A number line from zero to one can be divided into equal parts. Shade one part and use the right endpoint to plot a unit fraction.</desc>
        </svg>
      </section>

      <div class="feedback" id="feedback" hidden></div>

      <div class="caption-bar" id="captionBar" hidden>
        <div class="caption-text" id="captionText"></div>
      </div>

      <div class="stepper" aria-label="Walkthrough progress">
        <button class="stepper-button" id="stepBack" type="button" aria-label="Go back">‹</button>
        <div class="step-track" id="stepTrack"></div>
        <button class="stepper-button" id="stepNext" type="button" aria-label="Next step">›</button>
      </div>
    </main>

    <script>
      (function () {
        var svg = document.getElementById("numberLineSvg");
        var feedback = document.getElementById("feedback");
        var captionBar = document.getElementById("captionBar");
        var captionText = document.getElementById("captionText");
        var stepBack = document.getElementById("stepBack");
        var stepNext = document.getElementById("stepNext");
        var stepTrack = document.getElementById("stepTrack");

        var ns = "http://www.w3.org/2000/svg";
        var layout = {
          left: 210,
          right: 1390,
          y: 310,
          bandTop: 216,
          bandHeight: 94
        };
        var activeDrag = null;

        function frac(n, d) {
          return '<span class="vfrac"><span>' + n + '</span><span>' + d + '</span></span>';
        }

        function renderCaptionLine(line) {
          return String(line).replace(/\[\[(\d+)\s*\/\s*(\d+)\]\]/g, function (_, numerator, denominator) {
            return frac(numerator, denominator);
          });
        }

        function readEditableCaptionLines() {
          var node = document.querySelector('script[type="application/json"][data-subtitle-lines]');
          if (!node) return null;

          try {
            var data = JSON.parse(node.textContent || "{}");
            if (!Array.isArray(data.steps)) return null;
            return data.steps.map(function (step) {
              if (Array.isArray(step)) return step.map(String);
              if (Array.isArray(step.captionLines)) return step.captionLines.map(String);
              return [];
            });
          } catch (error) {
            return null;
          }
        }

        var steps = [
          {
            denominator: null,
            shaded: false,
            mode: "demo",
            whole: true,
            captionLines: [
              "First, find the whole.",
              "The whole is the distance from 0 to 1."
            ]
          },
          {
            denominator: 4,
            shaded: false,
            mode: "demo",
            showEqual: true,
            captionLines: [
              "To plot [[1/4]], divide the whole into 4 equal parts.",
              "Equal means every part is the same size."
            ]
          },
          {
            denominator: 4,
            shaded: true,
            mode: "demo",
            showEqual: true,
            showPoint: true,
            captionLines: [
              "Shade the first equal part.",
              "That is one fourth."
            ]
          },
          {
            denominator: 4,
            shaded: true,
            mode: "demo",
            showPoint: true,
            endpointNote: true,
            captionLines: [
              "The right end of the shaded part is the point for [[1/4]]."
            ]
          },
          {
            denominator: 4,
            shaded: false,
            mode: "task",
            target: 2,
            showControlDot: true,
            dragTip: true,
            captionLines: [
              "Your turn: plot [[1/2]].",
              "Drag the dot to make 2 equal parts, then tap the first part."
            ]
          },
          {
            denominator: 2,
            shaded: false,
            mode: "task",
            target: 3,
            showControlDot: true,
            dragTip: true,
            captionLines: [
              "Your turn: plot [[1/3]].",
              "Drag the dot to make 3 equal parts, then tap the first part."
            ]
          },
          {
            denominator: 3,
            shaded: true,
            mode: "demo",
            showPoint: true,
            endpointNote: true,
            captionLines: [
              "For [[1/3]], the right end of the shaded part",
              "is the point on the number line."
            ]
          },
          {
            denominator: 3,
            shaded: false,
            mode: "task",
            target: 8,
            showControlDot: true,
            dragTip: true,
            captionLines: [
              "Now plot [[1/8]].",
              "Drag the dot to make 8 equal parts, then tap the first part."
            ]
          }
        ];

        var editableCaptionLines = readEditableCaptionLines();
        if (editableCaptionLines) {
          editableCaptionLines.forEach(function (lines, index) {
            if (steps[index] && Array.isArray(lines)) {
              steps[index].captionLines = lines;
            }
          });
        }

        var state = {
          currentStep: 1,
          captionStarted: false,
          captionDismissed: false,
          denominator: null,
          shaded: false,
          draggedThisStep: false,
          feedbackText: "",
          feedbackKind: "try"
        };

        function make(tag, attrs) {
          var node = document.createElementNS(ns, tag);
          Object.keys(attrs || {}).forEach(function (key) {
            node.setAttribute(key, attrs[key]);
          });
          return node;
        }

        function append(parent, tag, attrs) {
          var node = make(tag, attrs);
          parent.appendChild(node);
          return node;
        }

        function xFor(value) {
          return layout.left + value * (layout.right - layout.left);
        }

        function valueForX(x) {
          return Math.max(0, Math.min(1, (x - layout.left) / (layout.right - layout.left)));
        }

        function closestDenominator(pointerX) {
          var value = Math.max(1 / 8, Math.min(1 / 2, valueForX(pointerX)));
          var best = 2;
          var bestDistance = Infinity;

          for (var denominator = 2; denominator <= 8; denominator += 1) {
            var distance = Math.abs(value - 1 / denominator);
            if (distance < bestDistance) {
              bestDistance = distance;
              best = denominator;
            }
          }

          return best;
        }

        function renderSubtitle() {
          var step = steps[state.currentStep - 1];
          captionBar.hidden = !state.captionStarted || state.captionDismissed || !step.captionLines.length;
          captionText.innerHTML = step.captionLines.map(function (line, index) {
            var closeButton = index === 0
              ? '<button class="caption-dismiss" type="button" aria-label="Close caption">×</button>'
              : "";
            return '<span class="subtitle-line"><span>' + renderCaptionLine(line) + closeButton + '</span></span>';
          }).join("");
        }

        function drawFractionLabel(group, x, y, numerator, denominator) {
          append(group, "text", { class: "fraction-text", x: x, y: y }).textContent = numerator;
          append(group, "line", {
            class: "fraction-rule",
            x1: x - 14,
            y1: y + 14,
            x2: x + 14,
            y2: y + 14
          });
          append(group, "text", { class: "fraction-text", x: x, y: y + 52 }).textContent = denominator;
        }

        function drawBase(group) {
          append(group, "line", {
            class: "axis",
            x1: 75,
            y1: layout.y,
            x2: 1525,
            y2: layout.y
          });
          append(group, "line", { class: "tick", x1: layout.left, y1: layout.y - 60, x2: layout.left, y2: layout.y + 60 });
          append(group, "line", { class: "tick", x1: layout.right, y1: layout.y - 60, x2: layout.right, y2: layout.y + 60 });
          append(group, "text", { class: "whole-label", x: layout.left, y: layout.y + 124 }).textContent = "0";
          append(group, "text", { class: "whole-label", x: layout.right, y: layout.y + 124 }).textContent = "1";
        }

        function drawWholeHighlight(group) {
          append(group, "rect", {
            class: "whole-highlight",
            x: layout.left,
            y: layout.bandTop,
            width: layout.right - layout.left,
            height: layout.bandHeight
          });
        }

        function drawParts(group, denominator, showEqual) {
          if (!denominator) return;
          var partWidth = (layout.right - layout.left) / denominator;

          for (var part = 0; part < denominator; part += 1) {
            append(group, "rect", {
              class: "part-band" + (part === 0 ? " is-first" : ""),
              x: layout.left + part * partWidth,
              y: layout.bandTop,
              width: partWidth,
              height: layout.bandHeight,
              "data-part-index": part
            });
          }

          for (var i = 1; i < denominator; i += 1) {
            var x = xFor(i / denominator);
            append(group, "line", {
              class: "tick minor-tick",
              x1: x,
              y1: layout.y - 46,
              x2: x,
              y2: layout.y + 46
            });
          }

          if (showEqual) {
            for (var equalPart = 0; equalPart < denominator; equalPart += 1) {
              append(group, "text", {
                class: "equal-label",
                x: layout.left + partWidth * equalPart + partWidth / 2,
                y: layout.bandTop - 22
              }).textContent = "equal";
            }
          }
        }

        function drawShade(group, denominator) {
          if (!denominator || !state.shaded) return;
          append(group, "rect", {
            class: "shade",
            x: layout.left,
            y: layout.bandTop,
            width: (layout.right - layout.left) / denominator,
            height: layout.bandHeight
          });
        }

        function drawEndpoint(group, denominator, pulsing) {
          if (!denominator || !state.shaded) return;
          var x = xFor(1 / denominator);
          append(group, "circle", {
            class: "endpoint" + (pulsing ? " is-pulsing" : ""),
            cx: x,
            cy: layout.y,
            r: 12
          });
          drawFractionLabel(group, x, layout.y - 178, 1, denominator);
        }

        function drawControlDot(group, denominator) {
          if (!denominator) return;
          var x = xFor(1 / denominator);
          var dot = append(group, "g", {
            class: "control-dot",
            tabindex: "0",
            role: "slider",
            "aria-valuemin": "2",
            "aria-valuemax": "8",
            "aria-valuenow": denominator,
            "aria-label": "Number of equal parts",
            "data-drag": "denominator"
          });

          append(dot, "circle", { class: "hit", cx: x, cy: layout.y, r: 28 });
          append(dot, "circle", { class: "outer", cx: x, cy: layout.y, r: 14 });
          append(dot, "circle", { class: "inner", cx: x, cy: layout.y, r: 7 });
        }

        function drawDragTip(group, denominator) {
          if (!denominator || state.draggedThisStep || state.feedbackText) return;
          var x = xFor(1 / denominator);
          var cardX = Math.min(x + 52, 1120);
          var cardY = 92;

          var tip = append(group, "g", { class: "drag-tip", "aria-hidden": "true" });
          append(tip, "line", {
            class: "drag-tip-line",
            x1: x + 16,
            y1: layout.y - 18,
            x2: cardX + 18,
            y2: cardY + 58
          });
          append(tip, "rect", {
            class: "drag-tip-card",
            x: cardX,
            y: cardY,
            width: 344,
            height: 82,
            rx: 10
          });
          append(tip, "text", { class: "drag-tip-text", x: cardX + 18, y: cardY + 32 }).textContent = "Drag this dot to change";
          append(tip, "text", { class: "drag-tip-text", x: cardX + 18, y: cardY + 60 }).textContent = "the number of equal parts.";
        }

        function drawEndpointNote(group, denominator) {
          if (!denominator) return;
          var x = xFor(1 / denominator);
          append(group, "line", {
            class: "arrow-note",
            x1: x + 36,
            y1: layout.y - 28,
            x2: x + 180,
            y2: layout.y - 100
          });
          append(group, "rect", {
            class: "note-card",
            x: x + 175,
            y: layout.y - 168,
            width: 310,
            height: 78,
            rx: 10
          });
          append(group, "text", { class: "note-text", x: x + 194, y: layout.y - 137 }).textContent = "This point names";
          append(group, "text", { class: "note-text", x: x + 194, y: layout.y - 108 }).textContent = "the fraction.";
        }

        function currentStep() {
          return steps[state.currentStep - 1];
        }

        function applyStepDefaults(stepIndex) {
          var step = steps[stepIndex - 1];
          state.currentStep = stepIndex;
          state.denominator = step.denominator;
          state.shaded = step.shaded;
          state.draggedThisStep = false;
          state.feedbackText = "";
          state.feedbackKind = "try";
          state.captionDismissed = false;
        }

        function renderControls() {
          feedback.hidden = !state.feedbackText;
          feedback.textContent = state.feedbackText;
          feedback.className = "feedback is-" + state.feedbackKind;
        }

        function renderStepper() {
          stepBack.disabled = state.currentStep <= 1 && !state.captionStarted;
          stepNext.disabled = state.currentStep >= steps.length;
          stepTrack.replaceChildren();

          steps.forEach(function (_, index) {
            var button = document.createElement("button");
            button.type = "button";
            button.className = "step-segment" + (index + 1 === state.currentStep ? " is-active" : "");
            button.setAttribute("aria-label", "Step " + (index + 1));
            button.addEventListener("click", function () {
              state.captionStarted = true;
              applyStepDefaults(index + 1);
              render();
            });
            stepTrack.appendChild(button);
          });
        }

        function render() {
          var step = currentStep();
          svg.replaceChildren();

          append(svg, "title", { id: "svgTitle" }).textContent = "Plot unit fractions on a number line";
          append(svg, "desc", { id: "svgDesc" }).textContent = "A number line from zero to one can be divided into equal parts. Shade one part and use the right endpoint to plot a unit fraction.";

          var base = append(svg, "g", {});
          if (step.whole) drawWholeHighlight(base);
          drawParts(base, state.denominator, step.showEqual);
          drawShade(base, state.denominator);
          drawBase(base);

          if (step.showPoint || state.shaded) {
            drawEndpoint(base, state.denominator, Boolean(step.showPoint));
          }

          if (step.endpointNote) {
            drawEndpointNote(base, state.denominator);
          }

          if ((step.showControlDot || step.mode === "task") && !(state.shaded && state.feedbackKind === "correct")) {
            drawControlDot(base, state.denominator);
          }

          if (step.dragTip) {
            drawDragTip(base, state.denominator);
          }

          renderSubtitle();
          renderControls();
          renderStepper();
        }

        function checkAnswer(partIndex) {
          var step = currentStep();
          if (step.mode !== "task") return;

          if (partIndex !== 0) {
            state.shaded = false;
            state.feedbackText = "Tap the first equal part, the one next to 0.";
            state.feedbackKind = "try";
            render();
            return;
          }

          state.shaded = true;

          if (state.denominator !== step.target) {
            state.feedbackText = "Not yet. Drag the dot until there are " + step.target + " equal parts.";
            state.feedbackKind = "try";
            render();
            return;
          }

          state.feedbackText = "Yes. One out of " + step.target + " equal parts is one " + (step.target === 2 ? "half." : step.target === 3 ? "third." : "eighth.");
          if (step.target === 8) {
            state.feedbackText = "Yes. The point at the right end shows one eighth.";
          }
          state.feedbackKind = "correct";
          render();
        }

        svg.addEventListener("click", function (event) {
          var part = event.target.closest("[data-part-index]");
          if (!part) return;
          if (currentStep().mode !== "task") return;
          checkAnswer(Number(part.dataset.partIndex));
        });

        function pointFromEvent(event) {
          var point = svg.createSVGPoint();
          point.x = event.clientX;
          point.y = event.clientY;
          return point.matrixTransform(svg.getScreenCTM().inverse());
        }

        function beginDrag(event) {
          var target = event.target.closest("[data-drag]");
          if (!target || currentStep().mode !== "task") return;
          activeDrag = { kind: target.dataset.drag };
          if (target.setPointerCapture && event.pointerId !== undefined) {
            target.setPointerCapture(event.pointerId);
          }
          event.preventDefault();
        }

        function updateDrag(event) {
          if (!activeDrag) return;
          var point = pointFromEvent(event);

          if (activeDrag.kind === "denominator") {
            var nextDenominator = closestDenominator(point.x);
            if (nextDenominator !== state.denominator) {
              state.denominator = nextDenominator;
              state.shaded = false;
              state.feedbackText = "";
              state.draggedThisStep = true;
              render();
            }
          }
        }

        svg.addEventListener("pointerdown", beginDrag);
        svg.addEventListener("pointermove", updateDrag);
        svg.addEventListener("pointerup", function (event) {
          if (!activeDrag) return;
          var target = event.target.closest("[data-drag]");
          if (target && target.releasePointerCapture) target.releasePointerCapture(event.pointerId);
          activeDrag = null;
        });
        svg.addEventListener("pointercancel", function () {
          activeDrag = null;
        });
        window.addEventListener("pointermove", updateDrag);
        window.addEventListener("pointerup", function () {
          activeDrag = null;
        });

        stepBack.addEventListener("click", function () {
          if (state.currentStep <= 1) {
            state.captionStarted = false;
            state.captionDismissed = false;
            applyStepDefaults(1);
            render();
            return;
          }

          state.captionStarted = state.currentStep - 1 !== 1;
          applyStepDefaults(Math.max(1, state.currentStep - 1));
          render();
        });

        stepNext.addEventListener("click", function () {
          if (!state.captionStarted) {
            state.captionStarted = true;
            state.captionDismissed = false;
            render();
            return;
          }

          applyStepDefaults(Math.min(steps.length, state.currentStep + 1));
          render();
        });

        captionText.addEventListener("click", function (event) {
          if (!event.target.closest(".caption-dismiss")) return;
          state.captionDismissed = true;
          render();
        });

        render();
      }());
    </script>
