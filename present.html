<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML Deck</title>
    <link rel="stylesheet" href="styles/deck.css">
  </head>
  <body class="player-page">
    <main class="deck-shell" aria-label="Presentation player">
      <div class="slide-frame" id="slideFrame" aria-live="polite"></div>

      <section class="speaker-notes" id="speakerNotes" aria-live="polite" hidden>
        <div class="speaker-notes__label">Speaker notes</div>
        <div class="speaker-notes__content" id="speakerNotesContent"></div>
      </section>

      <div class="screen-cover screen-cover--black" id="blackCover" hidden></div>
      <div class="screen-cover screen-cover--white" id="whiteCover" hidden></div>

      <nav class="player-bar" aria-label="Deck controls">
        <a class="player-bar__link" id="galleryLink" href="index.html">Gallery</a>
        <span class="player-bar__status" id="slideStatus">Loading...</span>
      </nav>

      <aside class="agent-panel" id="agentPanel" aria-label="Slide agent" hidden>
        <div class="agent-panel__header">
          <div>
            <h2>htmldeck</h2>
            <p id="agentSlideLabel">Current slide</p>
          </div>
          <button class="agent-panel__close" id="agentCloseButton" type="button" aria-label="Close agent">×</button>
        </div>

        <section class="agent-panel__versions" aria-label="Slide versions">
          <label>
            Versions
            <select id="versionSelect">
              <option value="">Current version</option>
            </select>
          </label>
        </section>

        <section class="agent-panel__api" aria-label="Direct OpenAI access">
          <label>
            OpenAI API key
            <input id="agentOpenAIKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <div class="agent-panel__api-actions">
            <button class="agent-link-button" id="agentSaveKeyButton" type="button">Use key</button>
            <button class="agent-link-button" id="agentForgetKeyButton" type="button">Forget</button>
          </div>
          <p id="agentKeyStatus">Direct mode saves the key only on this device.</p>
        </section>

        <div class="agent-timing-log" id="agentTimingLog" aria-label="Last agent timing" hidden></div>

        <div class="agent-messages" id="agentMessages" aria-live="polite"></div>

        <form class="agent-form" id="agentForm">
          <div class="agent-status" id="agentStatus" role="status" aria-live="polite" hidden></div>
          <label class="agent-instruction-label">
            <span class="sr-only">Instruction</span>
            <textarea id="agentInstruction" rows="4" placeholder="Make the title bigger"></textarea>
          </label>
          <button class="agent-send-button" id="agentSendButton" type="submit" aria-label="Send instruction">
            <span aria-hidden="true">↑</span>
          </button>
        </form>
      </aside>
    </main>

    <script type="module" src="app/deck-player.js?v=agent-sidebar"></script>
  </body>
</html>
