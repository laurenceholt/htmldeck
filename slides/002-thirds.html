<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thirds from 0 to 3</title>
    <link rel="stylesheet" href="../styles/slide.css">
  </head>
  <body>
    <main class="slide">
      <h1 class="slide-title">Thirds from 0 to 3</h1>
      <section class="number-line" aria-label="Thirds from 0 to 3">
        <svg viewBox="0 0 1600 260" role="img">
          <defs>
            <marker id="arrow-left" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M 10 0 L 0 5 L 10 10 z" fill="#202124"></path>
            </marker>
            <marker id="arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#202124"></path>
            </marker>
          </defs>
          <line class="axis" x1="32" y1="138" x2="1568" y2="138" marker-start="url(#arrow-left)" marker-end="url(#arrow-right)"></line>

          <g data-tick="0"><line class="tick" x1="64" y1="120" x2="64" y2="158"></line><text class="fraction-label" x="64" y="42">0</text><line class="fraction-rule" x1="42" y1="54" x2="86" y2="54"></line><text class="fraction-label" x="64" y="96">3</text><text class="whole-label" x="64" y="208">0</text></g>
          <g data-tick="1"><line class="tick" x1="227" y1="126" x2="227" y2="150"></line><text class="fraction-label" x="227" y="42">1</text><line class="fraction-rule" x1="205" y1="54" x2="249" y2="54"></line><text class="fraction-label" x="227" y="96">3</text></g>
          <g data-tick="2"><line class="tick" x1="391" y1="126" x2="391" y2="150"></line><text class="fraction-label" x="391" y="42">2</text><line class="fraction-rule" x1="369" y1="54" x2="413" y2="54"></line><text class="fraction-label" x="391" y="96">3</text></g>
          <g data-tick="3"><line class="tick" x1="554" y1="120" x2="554" y2="158"></line><text class="fraction-label" x="554" y="42">3</text><line class="fraction-rule" x1="532" y1="54" x2="576" y2="54"></line><text class="fraction-label" x="554" y="96">3</text><text class="whole-label" x="554" y="208">1</text></g>
          <g data-tick="4"><line class="tick" x1="717" y1="126" x2="717" y2="150"></line><text class="fraction-label" x="717" y="42">4</text><line class="fraction-rule" x1="695" y1="54" x2="739" y2="54"></line><text class="fraction-label" x="717" y="96">3</text></g>
          <g data-tick="5"><line class="tick" x1="881" y1="126" x2="881" y2="150"></line><text class="fraction-label" x="881" y="42">5</text><line class="fraction-rule" x1="859" y1="54" x2="903" y2="54"></line><text class="fraction-label" x="881" y="96">3</text></g>
          <g data-tick="6"><line class="tick" x1="1044" y1="120" x2="1044" y2="158"></line><text class="fraction-label" x="1044" y="42">6</text><line class="fraction-rule" x1="1022" y1="54" x2="1066" y2="54"></line><text class="fraction-label" x="1044" y="96">3</text><text class="whole-label" x="1044" y="208">2</text></g>
          <g data-tick="7"><line class="tick" x1="1207" y1="126" x2="1207" y2="150"></line><text class="fraction-label" x="1207" y="42">7</text><line class="fraction-rule" x1="1185" y1="54" x2="1229" y2="54"></line><text class="fraction-label" x="1207" y="96">3</text></g>
          <g data-tick="8"><line class="tick" x1="1371" y1="126" x2="1371" y2="150"></line><text class="fraction-label" x="1371" y="42">8</text><line class="fraction-rule" x1="1349" y1="54" x2="1393" y2="54"></line><text class="fraction-label" x="1371" y="96">3</text></g>
          <g data-tick="9"><line class="tick" x1="1534" y1="120" x2="1534" y2="158"></line><text class="fraction-label" x="1534" y="42">9</text><line class="fraction-rule" x1="1512" y1="54" x2="1556" y2="54"></line><text class="fraction-label" x="1534" y="96">3</text><text class="whole-label" x="1534" y="208">3</text></g>
        </svg>
      </section>
    </main>
    <script type="application/json" data-speaker-notes>
{
  "notes": "Count thirds from 0/3 to 9/3. Emphasize that every three thirds makes one whole: 3/3 is 1, 6/3 is 2 and 9/3 is 3."
}
    </script>
  </body>
</html>
